<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤣 DIMUTHU SUDARSHANA 🤣</title>
    <style>
        /* Smooth Scrolling effect */
        html {
            scroll-behavior: smooth;
        }

        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        /* Premium Dark Theme Background */
        body {
            background-color: #030306;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom Scrollbar Look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050508;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff007f, #7928ca);
            border-radius: 10px;
        }

        /* Floating Glow Effect background */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(121, 40, 202, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -10%; left: -10%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- ATAPATTAMA STYLE SUN-EARTH-MOON SYSTEM --- */
        .space-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Solar System Center Container */
        .solar-system {
            position: absolute;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotateX(65deg); /* Gives a beautiful 3D angled look like TV shows */
            transform-style: preserve-3d;
        }

        /* 1. THE SUN (මැද පවතින සූර්යයා) */
        .sun {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffea00 20%, #ff6a00 60%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #ff6a00, 0 0 120px #ff0055;
            transform: rotateX(-65deg); /* Keeps the sun spherical facing user */
        }

        /* Earth's Orbit Path (පෘථිවි කක්ෂය) */
        .earth-orbit {
            position: absolute;
            width: 450px;
            height: 450px;
            border: 2px dashed rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: spinOrbit 25s linear infinite;
            transform-style: preserve-3d;
        }

        /* 2. THE EARTH (පෘථිවිය) */
        .earth-wrapper {
            position: absolute;
            top: -30px; /* Positions Earth on the orbit line */
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            transform-style: preserve-3d;
        }

        .earth {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #00d2ff, #004687 70%, #001122);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            transform: rotateX(-65deg); /* Faces the screen directly */
        }

        /* Moon's Orbit Path (චන්ද්‍ර කක්ෂය - පෘථිවිය වටා) */
        .moon-orbit {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 100px;
            height: 100px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: spinOrbit 6s linear infinite;
        }

        /* 3. THE MOON (හඳ) */
        .moon {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #888888 80%);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Cosmic background stars */
        .star-dust {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.2;
        }

        /* Rotational Animations */
        @keyframes spinOrbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* ------------------------------------ */

        /* Sound Alert Overlay */
        .audio-notice {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            z-index: 100;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* SECTION 1: Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #fff, #8a8a93);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .hero p {
            color: #ff007f;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 40px;
        }

        /* Premium Down Arrow Button */
        .scroll-down-btn {
            position: absolute;
            bottom: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.3s;
        }

        .scroll-down-btn:hover {
            opacity: 1;
            transform: translateY(5px);
        }

        .scroll-down-btn .arrow {
            width: 25px;
            height: 25px;
            border-left: 2px solid #ff007f;
            border-bottom: 2px solid #ff007f;
            transform: rotate(-45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(-45deg); }
            40% { transform: translateY(-10px) rotate(-45deg); }
            60% { transform: translateY(-5px) rotate(-45deg); }
        }

        /* SECTION 2: Premium Gallery Collection */
        .gallery-section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 3px;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #ff007f, #7928ca);
            border-radius: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        /* Premium Glassmorphism Card Style */
        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4 / 5;
            cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.15, 0.85, 0.33, 1);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.15, 0.85, 0.33, 1);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 5, 8, 0.9) 0%, rgba(0,0,0,0) 60%);
            opacity: 0.8;
            transition: opacity 0.5s;
        }

        .card-details {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            z-index: 2;
            transform: translateY(10px);
            transition: transform 0.5s cubic-bezier(0.15, 0.85, 0.33, 1);
        }

        .card-details h3 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-details p {
            font-size: 0.85rem;
            color: #ff007f;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Premium Hover Effects */
        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 0, 127, 0.3);
            box-shadow: 0 40px 70px rgba(255, 0, 127, 0.15);
        }

        .card:hover img {
            transform: scale(1.06);
        }

        /* Responsive UI fixes */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.3rem; }
            .grid-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="space-container">

</body>
    </html>
