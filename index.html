<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤣 DIMUTHU SUDARSHANA 🤣</title>
    <style>
        /* Smooth Scrolling effect */
        html {
            scroll-behavior: smooth;
        }

        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        /* Premium Dark Theme Background */
        body {
            background-color: #050508;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom Scrollbar Look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050508;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff007f, #7928ca);
            border-radius: 10px;
        }

        /* Floating Glow Effect background */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(121, 40, 202, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -10%; left: -10%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: -1;
            pointer-events: none;
        }

        /* Sound Alert Overlay (Optional Info) */
        .audio-notice {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            z-index: 100;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* SECTION 1: Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #fff, #8a8a93);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .hero p {
            color: #ff007f;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 40px;
        }

        /* Premium Down Arrow Button */
        .scroll-down-btn {
            position: absolute;
            bottom: 50px;
            background: transparent;
            border: none;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.3s;
        }

        .scroll-down-btn:hover {
            opacity: 1;
            transform: translateY(5px);
        }

        .scroll-down-btn .arrow {
            width: 25px;
            height: 25px;
            border-left: 2px solid #ff007f;
            border-bottom: 2px solid #ff007f;
            transform: rotate(-45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(-45deg); }
            40% { transform: translateY(-10px) rotate(-45deg); }
            60% { transform: translateY(-5px) rotate(-45deg); }
        }

        /* SECTION 2: Premium Gallery Collection */
        .gallery-section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 3px;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #ff007f, #7928ca);
            border-radius: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        /* Premium Glassmorphism Card Style */
        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4 / 5;
            cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.15, 0.85, 0.33, 1);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.15, 0.85, 0.33, 1);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 5, 8, 0.9) 0%, rgba(0,0,0,0) 60%);
            opacity: 0.8;
            transition: opacity 0.5s;
        }

        .card-details {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            z-index: 2;
            transform: translateY(10px);
            transition: transform 0.5s cubic-bezier(0.15, 0.85, 0.33, 1);
        }

        .card-details h3 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-details p {
            font-size: 0.85rem;
            color: #ff007f;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Premium Hover Effects */
        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 0, 127, 0.3);
            box-shadow: 0 40px 70px rgba(255, 0, 127, 0.15);
        }

        .card:hover img {
            transform: scale(1.06);
        }

        /* Responsive UI fixes */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.3rem; }
            .grid-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="audio-notice">🎵 අටපට්ටම</div>

    <audio id="bg-sound" src="https://github.com/oshadha12345/OSHIYA-MULTIDEVICE/raw/refs/heads/main/ATAPATTAMA%20TV%20Program%20Ident(MP3_160K).mp3" preload="auto"></audio>

    <section class="hero">
        <h1>🤣 DIMUTHU 🤣</h1>
        <p>🤣DIMUTHU PICTURRS 🤣</p>
        
        <a href="#gallery" class="scroll-down-btn">
            <span>පාතටයන්න 👀</span>
            <div class="arrow"></div>
        </a>
    </section>

    <section class="gallery-section" id="gallery">
        <h2 class="section-title">🤣 DIMUTHU 🤣</h2>

        <div class="grid-container">
            
            <div class="card">
                <img src="https://raw.githubusercontent.com/oshadha12345/OSHIYA-MULTIDEVICE/refs/heads/main/IMG-20260315-WA0033.jpg" alt="Premium Art">
                <div class="card-details">
                    <h3>බය වෙලා 🤣</h3>
                    <p>Fine Art</p>
                </div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/oshadha12345/OSHIYA-MULTIDEVICE/refs/heads/main/Screenshot_20260411_070037.jpg" alt="Premium Art">
                <div class="card-details">
                    <h3>සුරයා 🤣</h3>
                    <p>Futuristic</p>
                </div>
            </div>

            <div class="card">
                <img src="https://raw.githubusercontent.com/oshadha12345/OSHIYA-MULTIDEVICE/refs/heads/main/Screenshot_20260521_053203.jpg" alt="Premium Art">
                <div class="card-details">
                    <h3>මල් කොමලයා 🤣</h3>
                    <p>Luxury Edition</p>
                </div>
            </div>

        </div>
    </section>

    <script>
        const sound = document.getElementById('bg-sound');

        // Site eke kohe touch/click karath meka weda karanawa
        document.addEventListener('click', () => {
            // Sound eka rewind karala nayeathutath muladi idan play wenna hadala thiyenne
            sound.currentTime = 0; 
            sound.play().catch(error => {
                console.log("Audio play error: Browser blocked autoplay until user interaction.");
            });
        });
    </script>

</body>
</html>
